gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types application/json application/javascript text/css text/plain application/xml image/svg+xml;

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the api container
  location /api/ {
    proxy_pass http://api:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;
  }

  # Product images — proxied from S3 (Floci locally) so the browser stays
  # same-origin (no CORS) while the bytes come from the object store.
  # In production, point this at CloudFront/S3 or set VITE_IMAGE_BASE_URL to the CDN.
  location /images/ {
    proxy_pass http://floci:4566/ansrmart-images/images/;
    proxy_set_header Host $host;
    proxy_hide_header Set-Cookie;
    proxy_intercept_errors on;
    # Fall back to the bundled static images if S3 has no object
    error_page 403 404 = @local_images;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location @local_images {
    root /usr/share/nginx/html;
    try_files $uri =404;
  }

  # Long-cache hashed static assets (Vite emits content-hashed filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
