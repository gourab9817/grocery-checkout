# One-command full stack:
#   cp .env.example .env
#   docker compose up --build
#
#   Web  → http://localhost:8080
#   API  → http://localhost:3000
#   DB   → localhost:5433  (user: ansrmart / pass: localdevpassword)  ← host port 5432 in use
#   AWS  → http://localhost:4566  (Floci — Secrets Manager, S3, SQS etc.)
#
# First-time seed (after containers are up):
#   docker compose exec api node db/seed.js

services:

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Floci (local AWS emulator) ────────────────────────────────────────────────
  floci:
    image: floci/floci:latest-compat
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./floci/init/start.d:/etc/floci/init/start.d:ro
      - floci-data:/app/data
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_STORAGE_MODE: hybrid
      FLOCI_STORAGE_PERSISTENT_PATH: /app/data
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://127.0.0.1:4566/_floci/health 2>/dev/null || wget -q --spider http://127.0.0.1:4566 2>/dev/null || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    restart: unless-stopped

  # ── Postgres ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ansrmart
      POSTGRES_USER: ansrmart
      POSTGRES_PASSWORD: localdevpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ansrmart -d ansrmart"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── API (Fastify) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: info
      # Postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ansrmart
      DB_USER: ansrmart
      DB_PASSWORD: localdevpassword
      # JWT (direct — no Secrets Manager lookup needed for local dev)
      JWT_SECRET: local-jwt-secret-dev-only-32chars
      # AWS / Floci (available for future S3/SQS usage)
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: http://localhost:8080
      IMAGE_BASE_URL: /images
      NOTIFICATIONS_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      floci:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Web (React → nginx) ───────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      floci:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  floci-data:
